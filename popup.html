<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms AI AutoFiller</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div class="brand">
          <img class="brand-logo" src="Icon.png" alt="Логотип Forms AutoFiller" />
          <span class="brand-name">Google Forms AutoFiller</span>
        </div>
        <p class="eyebrow">AI FORM ENGINE</p>
        <h1>Forms AutoFiller</h1>
        <p class="subtitle">Accurate Google Forms autocomplete with choice control and neat response style.</p>
        <div class="chip-row">
          <span class="chip">Strict Rules</span>
          <span class="chip">Stable Output</span>
        </div>
      </header>

      <section class="panel">
        <label class="field">
          <span>Providers</span>
          <select id="provider">
            <option value="openai">OpenAI (ChatGPT API)</option>
            <option value="anthropic">Anthropic (Claude API)</option>
          </select>
        </label>
      </section>

      <section class="provider-block" id="openaiBlock">
        <div class="provider-head">
          <h2>OpenAI</h2>
          <span class="badge">Recomended</span>
        </div>

        <label class="field">
          <span>API key</span>
          <input id="openaiApiKey" type="password" placeholder="sk-..." />
        </label>
        <label class="field">
          <span>Model</span>
          <select id="openaiModel">
            <option value="gpt-5.4">gpt-5.4 (great choice)</option>
            <option value="gpt-5.4-mini">gpt-5.4-mini (cheaper)</option>
            <option value="gpt-5.4-nano">gpt-5.4-nano (most cheap)</option>
          </select>
        </label>
        <p class="model-note">For most forms, it is better to use gpt-5.4.</p>
      </section>

      <section class="provider-block" id="anthropicBlock">
        <div class="provider-head">
          <h2>Anthropic</h2>
          <span class="badge">Sonnet 4.6</span>
        </div>

        <label class="field">
          <span>API key</span>
          <input id="anthropicApiKey" type="password" placeholder="sk-ant-..." />
        </label>
        <label class="field">
          <span>Model</span>
          <select id="anthropicModel">
            <option value="claude-sonnet-4-6">Claude 4.6 Sonnet (better quality)</option>
            <option value="claude-haiku-4-5-20251001">Claude 4.5 Haiku (cheaper)</option>
          </select>
        </label>
        <p class="model-note">If you want to save money, choose Haiku.</p>
      </section>

      <section class="panel">
        <label class="field">
          <span>Context about you for answers(like age, name, surname etc)</span>
          <textarea
            id="userContext"
            rows="4"
            placeholder="Пример: Я студент 3 курса, интересуюсь Python, хакатонами и веб-разработкой."
          ></textarea>
        </label>

        <label class="field">
          <span>Additional instructions</span>
          <textarea
            id="extraInstructions"
            rows="3"
            placeholder="Пример: Пиши кратко, по делу, дружелюбно."
          ></textarea>
        </label>

        <label class="field field-inline">
          <span>Temperature(0 - strict answers, 10 - creative) recomended: 2.0</span>
          <input id="temperature" type="number" min="0" max="1" step="0.1" />
        </label>
      </section>

      <div class="actions">
        <button id="saveButton" class="secondary" type="button">Save</button>
        <button id="fillButton" class="primary" type="button">Complete Form</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
